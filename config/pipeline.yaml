states:
  - {fips: "11", abbr: DC, name: District of Columbia}
  - {fips: "24", abbr: MD, name: Maryland}
  - {fips: "51", abbr: VA, name: Virginia}

census:
  cre_heat_tract_url: "https://www2.census.gov/programs-surveys/demo/datasets/community-resilience/2022/heat/CRE22_Heat_Tract.csv"
  lace_tract_url: "https://www2.census.gov/programs-surveys/demo/datasets/lace/2023/LACE_23_Tract.csv"
  acs:
    detailed_endpoint: "https://api.census.gov/data/2024/acs/acs5"
    subject_endpoint: "https://api.census.gov/data/2024/acs/acs5/subject"
    detailed_vars: [B01003_001E, B09021_022E, B09021_023E, B17001_001E, B17001_002E, B08201_001E, B08201_002E]
    subject_vars: [S1810_C01_001E, S1810_C02_001E, S0101_C01_030E]
  boundaries_url_template: "https://www2.census.gov/geo/tiger/GENZ2024/shp/cb_2024_{fips}_tract_500k.zip"

geocoder:
  batch_url: "https://geocoding.geo.census.gov/geocoder/locations/addressbatch"
  benchmark: "Public_AR_Current"

hospitals:
  healthdata_url: "https://healthdata.gov/resource/anag-cw7u.json"
  cms_url: "https://data.cms.gov/provider-data/api/1/datastore/query/xubh-q36u/0"
  cms_page_size: 1000  # CMS datastore API rejects larger limits; do not raise

cooling_sources:
  dc:
    arcgis_query_url: "https://services.arcgis.com/neT9SoYxizqTHZPH/arcgis/rest/services/DC_Cooling_Centers_View/FeatureServer/1/query"
    source_page: "https://opendata.dc.gov/datasets/9ee42555df88442fb357d77147bfdca3"
  va:
    wpsl_url: "https://www.vdh.virginia.gov/environmental-public-health-tracking/wp-admin/admin-ajax.php"
    source_page: "https://www.vdh.virginia.gov/environmental-public-health-tracking/climate-weather/cooling-centers/"
    sweep_points: [[38.90, -77.30], [37.55, -77.45], [36.85, -76.30], [37.00, -80.70]]
    search_radius_miles: 500
    max_results: 500
  md:
    hub_url: "https://health.maryland.gov/preparedness/Pages/Cooling-Centers-Contact-List-2026.aspx"
    pg_arcgis_query_url: "https://gis.princegeorgescountymd.gov/arcgis/rest/services/EOC/COOLINGCENTERS/MapServer/0/query"
    # baltimore_county intentionally omitted: its hot-weather page (captured
    # 2026-07-05) lists only category descriptions and phone/link
    # "check locations" pointers, no scrapeable per-center addresses.
    # See tests/fixtures/md_baltimore_county.html, data/sources/md_county_registry.json
    # (review_note), and README "known gaps".
    county_pages:
      anne_arundel: "https://www.aacounty.org/emergency-management/cooling-relief"
      howard: "https://www.howardcountymd.gov/community-sustainability/warming-and-cooling-center-information"

publish:
  site_data_dir: "site/data"
  coord_precision: 5
  min_geoid_match_rate: 0.99
  nearest_n: 10
  nearest_hospitals: 3
  gap_distance_km: 8.0
  gap_min_affected: 1500   # underserved = >=gap_distance_km AND >=this many people with 3+ heat factors (round number; 4% of tracts)
  request_timeout_s: 60
  map_center: [38.6, -77.6]
  map_zoom: 7
  fallback_areas:
    - {label: "Washington, DC", lat: 38.9047, lon: -77.0164, zoom: 12}
    - {label: "Baltimore, MD", lat: 39.2904, lon: -76.6122, zoom: 12}
    - {label: "Annapolis, MD", lat: 38.9784, lon: -76.4922, zoom: 13}
    - {label: "Columbia, MD", lat: 39.2037, lon: -76.8610, zoom: 13}
    - {label: "Richmond, VA", lat: 37.5407, lon: -77.4360, zoom: 12}
    - {label: "Norfolk, VA", lat: 36.8508, lon: -76.2859, zoom: 12}
    - {label: "Roanoke, VA", lat: 37.2710, lon: -79.9414, zoom: 13}
    - {label: "Northern Virginia", lat: 38.8462, lon: -77.3064, zoom: 11}
